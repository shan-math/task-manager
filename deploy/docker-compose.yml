services:
  db:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_PASSWORD:-rootpass}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-todo_db}
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ../Backend/sql/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p${MYSQL_PASSWORD:-rootpass}"]
      interval: 5s
      timeout: 5s
      retries: 12

  web:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    restart: unless-stopped
    ports:
      - "${FLASK_PORT:-5000}:5000"
    env_file:
      - ../Backend/.env
    environment:
      MYSQL_HOST: db
      FLASK_ENV: production
      MAIL_SUPPRESS_SEND: ${MAIL_SUPPRESS_SEND:-true}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - uploads_data:/app/Backend/uploads

volumes:
  mysql_data:
  uploads_data:
