{% if pages and pages > 1 %}
<nav class="pagination">
    {% for p in range(1, pages + 1) %}
        <a href="?page={{ p }}{% for k,v in request.args.items() if k != 'page' %}&{{ k }}={{ v }}{% endfor %}"
           class="{% if p == page %}active{% endif %}">{{ p }}</a>
    {% endfor %}
</nav>
<p class="muted">Page {{ page }} of {{ pages }} ({{ total }} tasks)</p>
{% endif %}
